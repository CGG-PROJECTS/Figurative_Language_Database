<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Picturebook Figurative Language Database</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, #f9fafb, #f3f4f6);
      color: #111827;
      margin: 0;
      padding: 20px;
    }
    .container { max-width: 1900px; margin: 0 auto; }
    h1 { color: #1d4ed8; text-align: center; margin-bottom: 8px; }
    .tagline { text-align: center; color: #4b5563; margin-bottom: 20px; font-size: 1.1rem; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }
    #globalSearch {
      width: 380px;
      max-width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }
    .btn {
      background: #1d4ed8;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { background: #1e40af; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    th {
      background: #1e40af;
      color: white;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tr:hover { background: #f0f9ff; }
    .filter-row input, .filter-row select { width: 100%; box-sizing: border-box; }
    .long-text { max-width: 450px; white-space: pre-wrap; line-height: 1.45; }
    .count { font-weight: bold; color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Picturebook Figurative Language Database</h1>
    <p class="tagline">Teacher-friendly interactive database • Search, sort & filter</p>

    <div class="controls">
      <input type="text" id="globalSearch" placeholder="Search any keyword (book, quote, domain...)">
      <button class="btn" onclick="exportCSV()">↓ Export Filtered as CSV</button>
      <a href="Figurative_Language_Database.zip" class="btn" download>↓ Download Full Database (.zip)</a>
    </div>

    <table id="dataTable">
      <thead>
        <tr id="headerRow"></tr>
        <tr class="filter-row" id="filterRow"></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <p style="text-align:center; margin-top:15px;">
      Showing <span id="rowCount" class="count">0</span> examples
    </p>
  </div>

  <script>
    let fullData = [];

    async function loadFromZip() {
      try {
        const response = await fetch('Figurative_Language_Database.zip');
        const zipBlob = await response.blob();
        const zip = await JSZip.loadAsync(zipBlob);

        // Try common CSV filenames inside the zip
        const csvFile = zip.file(/\.csv$/i)[0] || 
                       zip.file("Figurative Language Database.csv") ||
                       zip.file(Object.keys(zip.files)[0]);

        if (!csvFile) throw new Error("No CSV found inside zip");

        const csvText = await csvFile.async("string");

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            fullData = results.data.filter(row => Object.values(row).some(v => v)); // remove empty rows
            renderTable(fullData);
          }
        });
      } catch (err) {
        console.error(err);
        alert("Could not load the zip file.\nMake sure 'Figurative_Language_Database.zip' is in the same folder as index.html");
      }
    }

    function renderTable(data) {
      const headerRow = document.getElementById('headerRow');
      const filterRow = document.getElementById('filterRow');
      const tbody = document.getElementById('tableBody');

      headerRow.innerHTML = '';
      filterRow.innerHTML = '';
      tbody.innerHTML = '';

      if (data.length === 0) return;

      const columns = Object.keys(data[0]);

      // Headers
      columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        th.onclick = () => sortTable(col);
        headerRow.appendChild(th);
      });

      // Filter row
      columns.forEach((col, i) => {
        const td = document.createElement('td');
        const isDropdownCol = ['Book Type', 'Figurative Language Type', 'Source Domain', 'Target Domain'].includes(col);

        if (isDropdownCol) {
          const select = document.createElement('select');
          select.innerHTML = '<option value="">All</option>';
          const uniques = [...new Set(fullData.map(r => r[col]).filter(Boolean))].sort();
          uniques.forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val.length > 40 ? val.substring(0,37) + '...' : val;
            select.appendChild(opt);
          });
          select.onchange = filterTable;
          td.appendChild(select);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = 'Filter...';
          input.onkeyup = filterTable;
          td.appendChild(input);
        }
        filterRow.appendChild(td);
      });

      // Body
      data.forEach(row => {
        const tr = document.createElement('tr');
        columns.forEach(col => {
          const td = document.createElement('td');
          let val = row[col] || '';
          if (['Quotation from Source', 'Source Chain of Thought', 'Target Chain of Thought', 'AI Short Comment'].includes(col)) {
            td.className = 'long-text';
          }
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      document.getElementById('rowCount').textContent = data.length;
    }

    function filterTable() {
      const searchTerm = document.getElementById('globalSearch').value.toLowerCase().trim();
      const filters = Array.from(document.querySelectorAll('.filter-row td input, .filter-row td select'));

      const filtered = fullData.filter(row => {
        if (searchTerm && !Object.values(row).join(' ').toLowerCase().includes(searchTerm)) return false;

        return filters.every((el, i) => {
          const col = Object.keys(fullData[0])[i];
          const val = el.value.trim();
          if (!val) return true;
          return String(row[col] || '').toLowerCase().includes(val.toLowerCase());
        });
      });

      renderTable(filtered);
    }

    function sortTable(column) {
      fullData.sort((a, b) => {
        const valA = a[column] || '';
        const valB = b[column] || '';
        return String(valA).localeCompare(String(valB));
      });
      renderTable(fullData);
    }

    function exportCSV() {
      const headers = Object.keys(fullData[0]);
      let csv = headers.join(',') + '\n';
      document.querySelectorAll('#tableBody tr').forEach(tr => {
        const row = Array.from(tr.children).map(td => `"${td.textContent.replace(/"/g, '""')}"`);
        csv += row.join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'figurative_language_filtered.csv';
      link.click();
    }

    // Start loading
    window.onload = loadFromZip;
  </script>
</body>
</html>
