<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Picturebook Figurative Language Database</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, #f9fafb, #f3f4f6);
      color: #111827;
      margin: 0;
      padding: 20px;
    }
    .container { max-width: 1900px; margin: 0 auto; }
    h1 { color: #1d4ed8; text-align: center; margin-bottom: 8px; }
    .tagline { text-align: center; color: #4b5563; margin-bottom: 20px; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
      align-items: center;
    }
    #globalSearch { width: 380px; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    .btn { background: #1d4ed8; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; }
    .btn:hover { background: #1e40af; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #1e40af; color: white; cursor: pointer; position: sticky; top: 0; z-index: 10; }
    tr:hover { background: #f0f9ff; }
    .long-text { max-width: 450px; white-space: pre-wrap; line-height: 1.45; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .pagination button { padding: 8px 16px; }
    #loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      color: #1d4ed8;
    }
    .count { font-weight: bold; color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Picturebook Figurative Language Database</h1>
    <p class="tagline">Fast teacher-friendly view with pagination</p>

    <div class="controls">
      <input type="text" id="globalSearch" placeholder="Search anywhere...">
      <button class="btn" onclick="exportCSV()">↓ Export Filtered CSV</button>
      <a href="Figurative%20Language%20Database.zip" class="btn" download>↓ Full Database (.zip)</a>
    </div>

    <div id="loading">Loading database... (this may take 10-20 seconds)</div>

    <table id="dataTable" style="display:none;">
      <thead>
        <tr id="headerRow"></tr>
        <tr class="filter-row" id="filterRow"></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination" id="pagination" style="display:none;">
      <button onclick="prevPage()">← Previous</button>
      <span>Page <span id="currentPage">1</span> of <span id="totalPages">1</span></span>
      <button onclick="nextPage()">Next →</button>
      <select id="rowsPerPage" onchange="changeRowsPerPage()">
        <option value="50">50 rows</option>
        <option value="100" selected>100 rows</option>
        <option value="250">250 rows</option>
      </select>
    </div>

    <p style="text-align:center;">
      Showing <span id="rowCount" class="count">0</span> examples
    </p>
  </div>

  <script>
    let fullData = [];
    let filteredData = [];
    let currentPage = 1;
    let rowsPerPage = 100;

    async function loadFromZip() {
      const loadingEl = document.getElementById('loading');
      try {
        const response = await fetch('Figurative%20Language%20Database.zip');
        const zipBlob = await response.blob();
        const zip = await JSZip.loadAsync(zipBlob);

        const csvFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.csv'));
        if (!csvFile) throw new Error("No CSV inside zip");

        const csvText = await csvFile.async("string");

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            fullData = results.data.filter(row => Object.values(row).some(v => v && v.trim()));
            filteredData = [...fullData];
            loadingEl.style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
            document.getElementById('pagination').style.display = 'flex';
            renderTable();
          }
        });
      } catch (err) {
        loadingEl.textContent = "Error loading file. Make sure the .zip is in the same folder.";
        console.error(err);
      }
    }

    function renderTable() {
      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = filteredData.slice(start, end);

      // Render headers and filters only once
      if (currentPage === 1 && document.getElementById('headerRow').children.length === 0) {
        renderHeadersAndFilters();
      }

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      pageData.forEach(row => {
        const tr = document.createElement('tr');
        Object.keys(row).forEach(col => {
          const td = document.createElement('td');
          let val = row[col] || '';
          if (['Quotation from Source', 'Source Chain of Thought', 'Target Chain of Thought', 'AI Short Comment'].includes(col)) {
            td.className = 'long-text';
          }
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      document.getElementById('rowCount').textContent = filteredData.length;
      document.getElementById('currentPage').textContent = currentPage;
      document.getElementById('totalPages').textContent = Math.ceil(filteredData.length / rowsPerPage) || 1;
    }

    function renderHeadersAndFilters() {
      const columns = Object.keys(fullData[0] || {});
      const headerRow = document.getElementById('headerRow');
      const filterRow = document.getElementById('filterRow');

      headerRow.innerHTML = '';
      filterRow.innerHTML = '';

      columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        th.onclick = () => sortTable(col);
        headerRow.appendChild(th);
      });

      columns.forEach((col, i) => {
        const td = document.createElement('td');
        const dropdownCols = ['Book Type', 'Figurative Language Type', 'Source Domain', 'Target Domain'];

        if (dropdownCols.includes(col)) {
          const select = document.createElement('select');
          select.innerHTML = '<option value="">All</option>';
          const uniques = [...new Set(fullData.map(r => r[col]).filter(Boolean))].sort();
          uniques.forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val.length > 40 ? val.substring(0,37)+'...' : val;
            select.appendChild(opt);
          });
          select.onchange = filterTable;
          td.appendChild(select);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = 'Filter...';
          input.onkeyup = filterTable;
          td.appendChild(input);
        }
        filterRow.appendChild(td);
      });
    }

    function filterTable() {
      const searchTerm = document.getElementById('globalSearch').value.toLowerCase().trim();
      const filterEls = Array.from(document.querySelectorAll('.filter-row td input, .filter-row td select'));

      filteredData = fullData.filter(row => {
        if (searchTerm && !Object.values(row).join(' ').toLowerCase().includes(searchTerm)) return false;

        return filterEls.every((el, i) => {
          const col = Object.keys(fullData[0])[i];
          const val = el.value.trim();
          if (!val) return true;
          return String(row[col] || '').toLowerCase().includes(val.toLowerCase());
        });
      });

      currentPage = 1;
      renderTable();
    }

    function sortTable(column) {
      fullData.sort((a, b) => String(a[column] || '').localeCompare(String(b[column] || '')));
      filteredData.sort((a, b) => String(a[column] || '').localeCompare(String(b[column] || '')));
      currentPage = 1;
      renderTable();
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
      }
    }

    function nextPage() {
      if (currentPage < Math.ceil(filteredData.length / rowsPerPage)) {
        currentPage++;
        renderTable();
      }
    }

    function changeRowsPerPage() {
      rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
      currentPage = 1;
      renderTable();
    }

    function exportCSV() {
      if (filteredData.length === 0) return;
      const headers = Object.keys(filteredData[0]);
      let csv = headers.join(',') + '\n';
      filteredData.forEach(row => {
        const values = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`);
        csv += values.join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'figurative_language_filtered.csv';
      link.click();
    }

    // Event listeners
    document.getElementById('globalSearch').addEventListener('input', filterTable);

    // Start
    window.onload = loadFromZip;
  </script>
</body>
</html>
